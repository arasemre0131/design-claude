# ================================================================
#  __PRESET_ID__ — Local development stack
#  Usage: docker compose -f docker/compose.dev.yaml up -d
# ================================================================
name: __PRESET_ID__-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: __PRESET_ID__-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: preset_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d preset_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: __PRESET_ID__-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Qdrant (opsiyonel — AI embedding / vector search icin)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: __PRESET_ID__-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    profiles:
      - ai

  # Mailpit (opsiyonel — local email testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: __PRESET_ID__-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    profiles:
      - email

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
