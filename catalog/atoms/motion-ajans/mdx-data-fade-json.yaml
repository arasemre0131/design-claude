preview_snippet: |
  <!-- Attribute: data-reveal-clip (mdx data-fade-clip rewrite) -->
  <div data-reveal-clip='{"from":"polygon(40% 0, 60% 0, 60% 100%, 40% 100%)","to":"polygon(0 0, 100% 0, 100% 100%, 0 100%)"}'>
    ...
  </div>
  <script>
    document.querySelectorAll('[data-reveal-clip]').forEach(el => {
      const cfg = JSON.parse(el.dataset.revealClip);
      el.style.clipPath = cfg.from;
      ScrollTrigger.create({
        trigger: el, start: 'top 80%', once: true,
        onEnter: () => gsap.to(el, { clipPath: cfg.to, duration: 1.2, ease: 'power3.out' })
      });
    });
  </script>

