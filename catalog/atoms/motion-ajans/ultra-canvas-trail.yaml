preview_snippet: |
  if (matchMedia('(pointer: fine)').matches && !reducedMotion) {
    const cvs = document.querySelector('#trail');
    const ctx = cvs.getContext('2d');
    const trailPts = [];
    addEventListener('pointermove', e => trailPts.push({ x: e.clientX, y: e.clientY, life: 1 }));
    function loop() {
      ctx.fillStyle = 'rgba(13,14,20,0.1)';
      ctx.fillRect(0, 0, cvs.width, cvs.height);
      for (let i = trailPts.length - 1; i >= 0; i--) {
        const p = trailPts[i]; p.life -= 0.025;
        if (p.life <= 0) { trailPts.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10 * p.life, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(232, 90, 44, ${p.life * 0.35})`;
        ctx.fill();
      }
      requestAnimationFrame(loop);
    }
    loop();
  }

