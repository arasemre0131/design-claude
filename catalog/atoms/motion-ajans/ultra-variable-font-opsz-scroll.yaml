preview_snippet: |
  const heroMid = document.querySelector('.hero-middle');
  ScrollTrigger.create({
    trigger: '.hero', start: 'top top', end: '+=1200', scrub: 1,
    onUpdate: (s) => {
      const opsz = 9 + (144 - 9) * (1 - s.progress);
      const soft = 50 + 50 * (1 - s.progress);
      heroMid.style.fontVariationSettings = `"opsz" ${opsz}, "SOFT" ${soft}`;
    }
  });

