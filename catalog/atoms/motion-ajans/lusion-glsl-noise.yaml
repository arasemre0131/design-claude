preview_snippet: |
  // Vertex shader passes uv
  // Fragment shader (Ashima Arts simplex noise — MIT attribution)
  uniform float uTime;
  uniform vec3 uColor;
  varying vec2 vUv;

  // simplex noise by Ashima Arts (MIT) — github.com/ashima/webgl-noise
  float simplex(vec2 p) { /* ...Ashima impl... */ }
  float fbm(vec2 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 5; i++) { v += a * simplex(p); p *= 2.0; a *= 0.5; }
    return v;
  }
  void main() {
    vec2 uv = vUv * 3.0 + uTime * 0.1;
    float n = fbm(uv);
    gl_FragColor = vec4(mix(uColor, vec3(1.0), n), 1.0);
  }

