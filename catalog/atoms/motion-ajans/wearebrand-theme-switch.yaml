    trigger: '[data-theme="light"]',
    start: 'top 50%', end: 'bottom 50%',
    onEnter: () => document.body.classList.add('light'),
    onLeave: () => document.body.classList.remove('light'),
    onEnterBack: () => document.body.classList.add('light'),
    onLeaveBack: () => document.body.classList.remove('light')
  });

