preview_snippet: |
  /* CSS uses var */
  .hero { filter: saturate(calc(0.4 + var(--pulse) * 1.6)); }
  /* JS frame */
  function tick() {
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.002);
    document.documentElement.style.setProperty('--pulse', pulse);
    material.uniforms.uPulse.value = pulse;
    requestAnimationFrame(tick);
  }

