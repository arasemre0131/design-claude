preview_snippet: |
  // MIT-safe rewrite — ease curve kendi curve'ümüz
  const lenis = new Lenis({
    duration: 1.1,
    smoothWheel: true,
    touchMultiplier: 2,
    easing: t => 1 - Math.pow(1 - t, 3)  // kendi curve'ümüz (wearebrand "e => Math.min(1, 1.001 - Math.pow(2, -10*e))" değil)
  });
  lenis.on('scroll', ScrollTrigger.update);
  gsap.ticker.add(t => lenis.raf(t * 1000));
  gsap.ticker.lagSmoothing(0);

