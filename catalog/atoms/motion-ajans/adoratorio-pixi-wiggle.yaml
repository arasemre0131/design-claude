preview_snippet: |
  // PixiJS v8 custom Filter
  import { Filter, GpuProgram } from 'pixi.js';
  const vertex = `...`;
  const fragment = `
    uniform sampler2D uNoise;
    uniform float uProgress;
    uniform float uNoiseScale;
    void main() {
      vec4 noise = texture(uNoise, vTextureCoord * 10.0);
      noise *= 0.003 * uNoiseScale;
      vec2 displaced = vec2(vTextureCoord.x + noise.r, vTextureCoord.y);
      gl_FragColor = texture(uTexture, displaced);
    }
  `;
  const wiggle = new Filter({ glProgram: GpuProgram.from({ vertex, fragment }), resources: { /* ... */ } });

