preview_snippet: |
  const scrubSplit = new SplitText('#scrubText', { type: 'chars,words' });
  gsap.from(scrubSplit.chars, {
    filter: 'blur(30px)', opacity: 0.15,
    duration: 0.6, stagger: { each: 0.02 },
    scrollTrigger: { trigger: '#scrubText', start: 'top 85%', end: 'bottom 60%', scrub: true }
  });

