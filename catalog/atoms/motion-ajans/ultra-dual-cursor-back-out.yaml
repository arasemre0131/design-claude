preview_snippet: |
  const cur = document.querySelector('.cursor');
  const curBig = document.querySelector('.cursor-big');
  let mx = 0, my = 0, bx = 0, by = 0;
  addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
  });
  gsap.ticker.add(() => {
    bx += (mx - bx) * 0.14;
    by += (my - by) * 0.14;
    curBig.style.transform = `translate(${bx}px, ${by}px) translate(-50%, -50%)`;
  });
  document.querySelectorAll('[data-magnetic]').forEach(el => {
    el.addEventListener('mouseenter', () => curBig.classList.add('magnetic'));
    el.addEventListener('mouseleave', () => curBig.classList.remove('magnetic'));
  });

