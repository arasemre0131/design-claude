preview_snippet: |
  const split = new SplitText(h, { type: 'lines,words', mask: 'lines' });
  gsap.from(split.words, {
    yPercent: 120, opacity: 0, filter: 'blur(20px)',
    duration: 1.1, stagger: 0.04, ease: 'expo.out',
    scrollTrigger: { trigger: h, start: 'top 80%', once: true }
  });

