# 2026 trend uyumu
trends_2026:
  kinetic_typography: yes        # Fraunces opsz 9→144 axis scroll-linked — mücevher zarafet
  bento_2_0: yes                 # L8 masonry + asymmetric ürün vitrin
  maximalism: no                 # mücevher sakin + rafine olmalı, dense overlap premium hissi öldürür
  3d_spline: yes                 # Tier 3+ için şart (diamond, saat)
  scroll_triggered_3d: yes       # Premium'da kritik — ürün döndürme + kamera path

