# 2026 trend uyumu
trends_2026:
  kinetic_typography: partial    # fiyat stat SplitText reveal OK
  bento_2_0: yes                 # ilan kartı + özellikler asymmetric
  maximalism: no                 # güven + netlik
  3d_spline: yes                 # Tier 3+ çok değerli (sanal tur)
  scroll_triggered_3d: yes       # Premium'da oda-oda kamera path

# Scaffolder için çıktı notları
scaffold_hints:
  font_test_required: ["ı", "İ", "ğ", "ş", "ç", "ö", "ü", "Ç", "Ö", "Ü", "Ş"]
  mobile_breakpoint: [375, 768, 1280]
  listing_card: "foto + fiyat + m² + oda + konum, hover floor plan preview"
  listing_gallery: "L8 masonry 3-col desktop, 2-col tablet, 1-col mobile"
  primary_cta: "İlanı Gör"
  secondary_cta: "Agent ile İletişime Geç"
  map_integration: "Mapbox GL JS custom style, marker cluster (50+ ilan), hover = ilan preview"
  schema: "RealEstateListing + PostalAddress + GeoCoordinates + Offer JSON-LD"
  mobile_critical: "Sticky 'İletişim' + 'Harita' toggle bottom bar"
