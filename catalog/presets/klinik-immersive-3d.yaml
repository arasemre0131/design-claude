# KOŞUL (matrix_cell ⚠ gereği):
# Bu preset SADECE aşağıdaki durumda kullanılır:
#   1. Estetik klinik (plastik cerrahi, diş hekim gülüş tasarımı, saç ekim)
#   2. "Before-after" yerine "simülasyon önizleme" (önceki/sonraki klişesi DEĞİL)
#   3. Sağlık Bakanlığı reklam yasası uyumu (etik bildirim zorunlu, promise = tehlikeli)
#   4. KVKK onay + hasta verisi RLS + lokal işlenir (3D simülasyon client-side only, cloud upload YOK)
# Genel klinik tanıtım sitesi için editorial-luxury (mucevher-editorial-luxury benzeri) tercih.

mood: [sakin, controlled-immersion, before-after-simulation, medical-grade-3d, trust-forward, low-motion]

atoms:
  palette: PL27              # Glacier + Sage — PL1 YASAK (klinik güveni!), sıcak-sakin medikal ton
  typography: TY33           # Fraunces + IBM Plex Sans — TY8 YASAK, italic overlay sadece section başlığı
  hero: HR11                 # Brochure cover (HR4 3D-canvas hero KLİNİKTE TEDIRGİNLİK) — 3D inspector alt sayfada
  layout:
    - L6                     # Center single col (sakin, güven odaklı)
    - L7                     # Sticky sidebar + feed (tedavi listesi)
  motion:
    - MO10                   # Print-first static (hero + genel sayfa)
    - MO4                    # Framer Motion light (Framer subtle, kinetic YASAK klinik.yaml kuralı)
    - MO2                    # Lenis lerp 0.05 (çok yavaş, medikal nefes)
    - MO12                   # R3F postprocessing SADECE simülasyon alt sayfasında (hero'da değil!)
  motion_ajans: []                      # lusion glsl noise + porthole dive KLİNİKTE YASAK — agresif
  3d:
    - 3D-01-drei-envmap                 # Medical studio HDRI (nötr ışık)
    - 3D-02-drei-orbitcontrols          # Simülasyon 360 (ürün değil, before/after model)
    - 3D-03-drei-presentationcontrols   # Mobilde drag + damped
    - 3D-04-drei-contactshadows         # Subtle shadow (opacity 0.4)
    - 3D-05-drei-html                   # 3D nokta üzerinde tooltip (diş adı, estetik işlem)
    - 3D-08-drei-meshtransmission       # Diş hekim — cam/email material (gülüş tasarımı)
    - 3D-11-gaussian-splat              # Hasta-yüz scan (client-side only, lokal, RLS + storage null)
    - 3D-12-gltf-draco-ktx2             # Compression ZORUNLU
  header: H9                 # Corner brackets — H8 YASAK
  nav: N2                    # Horizontal tabs underline (N10 scroll-locked klinik için aşırı)
  kpi: K5                    # Almanac editorial (15 yıl, 5000 hasta) — K1 K7 YASAK
  table: T3                  # Spec sheet (tedavi süresi, iyileşme, fiyat aralığı)
  chat: C3                   # Email threaded (randevu formu)
  form: F5                   # Multi-step wizard (randevu + KVKK onay)
  modal: M1                  # Centered (KVKK onay, randevu onayı)
  footer: FT3                # Warm editorial (güven + sıcak ton)

components:
  core:
    - HeroBrochure                      # HR11 — tedavi kapak grid (3D canvas hero YASAK)
    - TreatmentListSticky               # L7 — tedavi listesi sticky sidebar
    - SimulationViewer3D                # ALT SAYFA — gülüş tasarımı / estetik before-after 3D
    - GaussianSplatFacePreview          # Hasta-yüz scan (SADECE client-side, cloud upload YOK)
    - SmileDesignPreview                # Diş hekim — kesim + material + renk önizleme
    - PostprocessingStack               # Simülasyon sayfasında tone mapping sadece (bloom KAPALI)
    - AppointmentWizard                 # F5 multi-step (tarih → tedavi → KVKK onay → iletişim)
    - KvkkConsentModal                  # M1 — açık rıza (3D simülasyon öncesi zorunlu)
    - TreatmentSpecSheet                # T3 — süre, iyileşme, fiyat aralığı (Sağlık Bakanlığı uyum)
    - EthicalDisclaimer                 # "Bireysel sonuçlar değişir" etik bildirim zorunlu alt yazı
    - WarmFooter                        # FT3
  optional:
    - PatientPortal                     # Hasta portalı (Supabase auth + RLS)
    - WhatsAppBookingBridge             # Randevu onayı WhatsApp bildirim
    - ArSmileTryOn                      # Model-viewer AR (telefon önüne tut → gülüş önizle)

anti_cliche:
  forbidden_palettes: [PL1, PL8]
  forbidden_typography: [TY1, TY2, TY4, TY8]
  forbidden_heroes: [HR2, HR4, HR7]     # HR4 3D-canvas-hero KLİNİKTE YASAK (agresif mood)
  forbidden_tables: [T6]
  forbidden_kpi: [K1, K7]
  forbidden_headers: [H8]
  forbidden_layouts: [L1, L7-unless-treatment-list]
  forbidden_motion: ["agresif-scroll-pin", "fast-kinetic-typography", "neon-flash", "MO1-scrub-1.5-aggressive"]
  forbidden_motion_ajans: ["lusion-glsl-noise", "ultra-porthole-dive"]  # klinikte agresif shader YASAK
  forbidden_patterns:                   # klinik.yaml'dan
    - "dental-boutique-playfair-italic-gold-underline"
    - "stok-foto-gulumseyen-disler"
    - "typeform-merhaba-ben-dr-x-overpersonal"
    - "before-after-yasal-ihlal-promising"
  repeat_score_vs_existing: 1           # temiz sektör + 3D hero yok — eşleşme risk düşük
  warning: |
    KLİNİK × immersive-3d KONDİSYONEL — sadece estetik klinik (gülüş tasarımı, saç ekim, plastik
    cerrahi) için KULLANILIR. Genel klinik (aile hekimi, fizyoterapi, dermatoloji) için
    editorial-luxury default. HR4 3D-canvas-hero KLİNİKTE YASAK — hasta tedirgin olur. 3D
    simülasyon ALT SAYFADA izole canvas + açık rıza modal (KVKK) + "Bireysel sonuçlar değişir"
    etik bildirim ZORUNLU. Gaussian Splat hasta-yüz scan SADECE client-side (lokal işlenir, cloud
    upload YOK, RLS + storage null). Sağlık Bakanlığı reklam yasası uyumu: before-after
    fotoğrafı kullanılıyorsa etik bildirim + disclaimer zorunlu. Motion sakin (MO10 + MO4 + MO2
    lerp 0.05), lusion-glsl-noise + porthole-dive klinik için YASAK.

compatibility:
  forbidden_sectors: []                 # self
  conditional_sectors: [klinik-estetik-only]
  recommended_for: [klinik-estetik, dis-hekim-gulus-tasarim, sac-ekim, plastik-cerrahi]
  matrix_row_peers:
    default: []
    active: [insaat, mucevher, eticaret, fotograf, gayrimenkul, otel]
    conditional: [klinik]

preview_app_route: /preview/klinik-immersive-3d
scaffold_command: "node scaffold.js klinik-immersive-3d --out ./klinik-v3-estetik/"

