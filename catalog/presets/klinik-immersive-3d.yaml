scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  mobile_fallback: "3D simülasyon skip → 2D before-after slider (klasik, etik disclaimer zorunlu), hero zaten HR11 brochure (3D canvas yok)"
  gpu_tier_detection: "detect-gpu tier 0-2 → 2D before-after slider fallback, tier 3+ → 3D simülasyon aktif ama opt-in (kullanıcı 'Görüntülemek için Tıkla' buton)"
  model_compression: "Gaussian Splat yüz scan max 15K point (~5MB, client-side only — cloud upload yok), GLB Draco + KTX2 max 2MB"
  target_fps:
    desktop: 60
    mobile: 30
  turkish_chars_test: ["ı", "İ", "ğ", "ş", "ç", "ö", "ü", "Ç", "Ö", "Ü", "Ş"]
  font_test_urls:
    - "Fraunces opsz 9-144 wght 300-600 (variable, sadece section başlık)"
    - "IBM Plex Sans 300-700 (gövde)"
  wcag_contrast_target: "AAA (7:1) — klinik için AAA zorunlu (klinik.yaml kural) + 3D canvas aria-label='Tedavi simülasyon önizleme — etkileşim için opt-in. Bireysel sonuçlar değişir.' + keyboard nav (tam erişim: tab + enter + esc + ok)"
  lighthouse_target: 90                             # klinik için 90 zorunlu (AAA + güven)
  prefers_reduced_motion: "Tüm motion off, 3D simülasyon 1 frame render (frameloop='never'), Lenis lerp 0 (instant scroll)"
  legal_critical: "KVKK açık rıza (3D simülasyon öncesi) + çerez banner + Sağlık Bakanlığı reklam yasası 'öncesi-sonrası etik bildirimi' + 'Bireysel sonuçlar değişir' disclaimer + tedavi süresi/iyileşme/risk tablosu zorunlu"
  privacy_3d_critical: "Hasta-yüz Gaussian Splat scan SADECE client-side (browser memory), sunucuya upload YOK, RLS + storage null, session end = data flush"
  primary_cta: "Randevu Al"
  secondary_cta: "Tedavileri İncele"
  mobile_critical: "Sticky WhatsApp + telefon bottom bar, 3D simülasyon opt-in butonu (default kapalı)"
  schema: "MedicalClinic + Physician + MedicalProcedure + MedicalContraindication (risk) + Offer JSON-LD"
  accessibility_extras: "WCAG AAA contrast + screen reader testi + tab order + focus visible + skip to content link + text-to-speech compatible"
  special_features:
    - "3D gülüş tasarımı (drei MeshTransmissionMaterial — diş email)"
    - "Gaussian Splat hasta-yüz scan (client-side only, cloud YOK)"
    - "KVKK açık rıza modal (3D simülasyon öncesi zorunlu)"
    - "Sağlık Bakanlığı uyum (etik bildirim + disclaimer)"
    - "Opt-in 3D (default kapalı, kullanıcı tıklar aktif)"
    - "AAA contrast + full keyboard nav"
