  - Mobilyacı/3d-demo/research/image-optimization-cdn-cloudinary-2026.md
  - Mobilyacı/3d-demo/research/admin-dashboard-patterns-2026.md

scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  turkish_chars_test: ["ı", "İ", "ğ", "ş", "ç", "ö", "ü", "Ç", "Ö", "Ü", "Ş"]
  font_test_urls:
    - "Fraunces opsz 9-144"
    - "IBM Plex Sans 300-600"
  wcag_contrast_target: "AA (4.5:1)"
  lighthouse_target: 92
  primary_cta: "İlanı Gör"
  secondary_cta: "Agent ile İletişime Geç"
  listing_card: "foto + fiyat + m² + oda + konum, hover = floor plan preview"
