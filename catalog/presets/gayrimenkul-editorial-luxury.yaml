  map_integration: "Mapbox GL JS custom style, marker cluster (50+ ilan), hover = ilan preview"
  schema: "RealEstateListing + PostalAddress + GeoCoordinates + Offer JSON-LD"
  mobile_critical: "Sticky 'İletişim' + 'Harita' toggle bottom bar"
