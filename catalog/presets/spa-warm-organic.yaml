  - research/design-claude/mockups/a-warm-dark/index.html       # 5/5 warm dark variant ref
  - research/design-claude/templates/07-spa/index.html          # 4/5 Pearl+Seafoam + Lenis slow ref

scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  turkish_chars_test: ["ı", "İ", "ğ", "Ğ", "ş", "Ş", "ç", "Ç", "ö", "Ö", "ü", "Ü"]
  font_test_urls:
    - "Cormorant Infant italic 400/600 (display)"
    - "Inter Tight 300-500 (body)"
  wcag_contrast_target: "AA (4.5:1) — bg #F5F1E8 × rootbark #6B5E4C = 5.7:1 ✓"
  lighthouse_target: 93
  hero_assets: "slow-mo loop video (su damlası, yaprak, buhar, 8-12s, ≤4MB) VEYA still organik bitki foto"
  primary_cta: "Randevu Al"
  secondary_cta: "Paketleri İncele"
  motion_config: "Lenis lerp 0.05-0.08 (ultra-slow), CSS scroll-driven opacity subtle (0.3→1), duration 0.8-1.5s ease power2.out"
  prefers_reduced_motion: "Scroll-reveal off, immediate display + static fallback"
  special_note: "Motion çok sakin — 0.8-1.5s duration, ease 'power2.out', hızlı animation YASAK. Gold vurgu YASAK, italic = Cormorant Infant (Playfair DEĞİL). SVG grain opacity 0.04 tactile katman."
  schema: "HealthAndBeautyBusiness + Service + OpeningHoursSpecification JSON-LD"
  legal: "KVKK onay + çerez banner, hediye çeki tek kullanımlık token"
