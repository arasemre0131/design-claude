    beyaz hastane UI'sı değil, Swiss cream + off-black sıcak-güven. Sağlık Bakanlığı reklam yasası
    'öncesi-sonrası bildirimi' zorunlu. MO10 print-first veya MO3 subtle CSS tercih — kinetic ASLA.

