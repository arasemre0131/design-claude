  nav: N2                           # Horizontal Tabs Underline
  kpi: K2                           # Band + Rules ("18 yıl · 4 hekim · 2.400 mutlu hasta")
  table: T2                         # Linear Dense (tedavi + süre + fiyat)
  form: F1                          # Single-col Tall (randevu formu, KVKK onay)
  modal: M1                         # Centered Dialog
  footer: FT4                       # Colophon (hekim diploma + sertifika)

components:
  core:
    - HeroBrochureCover             # HR11
