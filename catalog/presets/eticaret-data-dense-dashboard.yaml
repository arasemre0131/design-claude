scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  mobile_strategy: |
    Dense dashboard mobile'da zorlanır — 375px için sidebar collapse,
    CommandPalette (⌘K → mobile'da tap "ara" buton) primary nav,
    dense tablolar horizontal scroll + sticky ilk sütun (SKU/Sipariş No).
    InlineExpandRow yerine M3 bottom sheet mobile.
  turkish_chars_test: ["ı", "İ", "ğ", "Ğ", "ş", "Ş", "ç", "Ç", "ö", "Ö", "ü", "Ü"]
  font_test_urls:
    - "Unbounded 400-800 (display)"
    - "Manrope 300-700 (body)"
    - "IBM Plex Mono 400 (tabular-nums, SKU, tutar, tarih)"
  wcag_contrast_target: "AA (4.5:1) + monospace 14px minimum readable"
  lighthouse_target: 92
  virtualization: "TanStack Virtual ZORUNLU 200+ row (ürün listesi, sipariş listesi, activity log)"
  keyboard_nav: "j/k vim navigation + arrow + Tab + ⌘K palette + / arama + ⌘Enter save ZORUNLU"
  tabular_nums_css: "font-variant-numeric: tabular-nums lining-nums — tüm para/adet/tarih hücrelerinde"
  primary_cta: "Yeni Ürün Ekle / Sipariş İncele"
  secondary_cta: "Filtrele / Dışa Aktar"
  special_features:
    - "⌘K command palette (cmdk lib) — 'Ürün ara' / 'Sipariş git #1248' / 'Rapor çek'"
    - "Inline edit (fiyat/stok/başlık contentEditable + ⌘S auto-save)"
    - "Bulk action toolbar (5 ürün seçili · indirim uygula / sil / export)"
    - "Supabase Realtime sipariş feed (pulse dot canlı)"
    - "TanStack Virtual (1000+ ürün performanslı)"
    - "dnd-kit sortable (kategori + variant sıralama)"
    - "sonner toast (save confirmation)"
    - "vaul drawer (mobile filter sheet)"
  schema: "Admin-only route — storefront SEO ayrı proje (noindex header)"
  performance_critical: "Table render < 16ms/row, ⌘K açılış < 50ms, filter apply < 100ms INP"
  auth_critical: "Supabase RLS her tabloda + admin role check middleware + audit log (kim ne zaman ne değiştirdi)"
