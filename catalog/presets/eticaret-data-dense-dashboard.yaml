id: eticaret-data-dense-dashboard
sector: eticaret
style: data-dense-dashboard
recipe: next-premium                  # mid default; büyük e-ticaret için next-enterprise-monorepo'ya çıkar
tier: mid
budget_range_try: [18000, 32000]
delivery_weeks: [3, 4]
matrix_cell: "✓✓"                     # eticaret × data-dense-dashboard DEFAULT
