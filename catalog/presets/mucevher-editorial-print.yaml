scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  mobile_strategy: "3-col CSS columns mobile'da 1-col fallback · masonry 2→1 col responsive"
  turkish_chars_test: ["ı", "İ", "ğ", "ş", "ç", "ö", "ü", "Ç", "Ö", "Ü", "Ş"]
  font_test_urls:
    - "Instrument Serif italic (display — koleksiyon başlık)"
    - "IBM Plex Serif 400-500 + italic (body + ürün açıklama)"
    - "IBM Plex Mono 400-500 (ayar · gram · fiyat metadata)"
  wcag_contrast_target: "AA (4.5:1) baseline — ink #131313 × paper #F5F1E8 = 17.2:1 AAA native"
  lighthouse_target: 93                     # editorial + e-ticaret + iyzico — dengeli
  hyphens: "auto (Türkçe justified editorial text için kelime kopması kontrollü)"
  print_stylesheet: "YES — @media print + koleksiyon PDF katalog export (press kit zorunlu)"
  primary_cta: "Koleksiyonu Keşfet"
  secondary_cta: "Atölye Dergi"
  product_gallery: "masonry 2-col small (type-öncelikli · L8 dev kıyasla küçük) · 1-col mobile"
  product_card: "editorial list: ad (Instrument italic) + italic açıklama + mono fiyat + square 1:1 crop"
  schema: "Product + Offer + Brand + CreativeWork + Article (atölye dergisi) JSON-LD"
  trust_badges: "iyzico SSL · KVKK · Kuyumcukent · SAN-TEZ · sertifika QR doğrulama"
  mobile_critical: "Sticky bottom bar: WhatsApp · Favorile · Sepete · Dergi"
  special_features:
    - "Atölye dergisi MDX (drop cap + pull quote + byline — press release tonu)"
    - "Koleksiyon PDF katalog export (print stylesheet + press kit)"
    - "Sertifika QR doğrulama (sertifika no + atölye imza)"
    - "Editorial ürün listesi (card grid T6 DEĞİL — list ad+italic+mono)"
    - "Newsletter 'aylık dergi' signup (press release abonelik)"
    - "Özel sipariş inquiry form (Fraunces italic form label — editorial ton)"
