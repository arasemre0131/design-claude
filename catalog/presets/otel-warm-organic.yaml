---

# Stil mood — butik otel kaçış + terracotta+sky organik
# Konsept: Drone video hero + Fraunces italic kaçış hissi + native booking (iframe DEĞİL).
mood: [kacis, lux-erisilebilir, warm-terracotta, deneyim, isik-manzara, unhurried, butik]

atoms:
  palette: PL37                # Terracotta + Sky — butik otel warm, PL1 luxury dark'ın ters
                               # Alt: PL38 Cool Marble (minimal butik otel için)
  typography: TY43             # Fraunces italic opsz 144 + Inter Tight — "kaçış" italic
  hero: HR3                    # Full-bleed drone video (havuz/manzara/dış cephe, 15-20s, ≤8MB)
                               # Alt: HR11 Brochure Cover (editorial odak)
  layout:
    - L4                       # Full-bleed rails (oda tipi horizontal gallery)
    - L8                       # Masonry oda foto grid
  motion:
    - MO2                      # Lenis smooth (lerp 0.06-0.08, sakin butik)
    - MO7                      # View Transitions API (oda → rezervasyon flow morph)
    - MO10                     # Print-first fallback
  motion_ajans:
    - wearebrand-blur-36px-reveal        # oda kartı reveal (yumuşak)
    - wearebrand-lenis-gsap-bridge       # Lenis + GSAP scrub 2.5 (kaçış akışı)
    - ultra-variable-font-opsz-scroll    # Fraunces opsz 9→144 oda adı scroll-linked
  header: H2                   # Masthead Centered — wordmark + lokasyon subtitle + hairline
  nav: N2                      # Horizontal Tabs Underline (Odalar/Restoran/Spa/Rezervasyon)
  kpi: K5                      # Almanac Editorial — "90 oda · 18 suite · 2 havuz · 1 spa"
  form: F1                     # Single-col tall (native rezervasyon: tarih → oda → misafir → ekstra)
  modal: M1                    # Centered Dialog (oda detay galerisi + fiyat)
  footer: FT4                  # Colophon — otel künyesi + adres + sosyal + sertifika

components:
  core:
    - HeroFullBleedDroneVideo            # HR3 — drone loop 15-20s ≤8MB, gradient scrim + copy
    - MastheadCentered                   # H2 — Fraunces italic otel adı + "Bodrum · Est. 1998"
    - HorizontalTabsNav                  # N2 — Odalar/Restoran/Spa/Rezervasyon/İletişim
    - FullBleedRoomRails                 # L4 — oda tipi horizontal scroll gallery
    - MasonryRoomGallery                 # L8 — her oda foto galerisi masonry
    - AlmanacEditorialKpi                # K5 — "90 oda · 2 havuz · 1 spa · Est. 1998"
    - NativeBookingFlow                  # F1 — 5 adım: tarih → oda → misafir → ekstra → ödeme
    - ViewTransitionRoomDetail           # MO7 — oda listesi → detay morph
    - VariableFontOpszScroll             # Fraunces 9→144 oda adı (suite/deluxe/standart)
    - ColophonFooter                     # FT4 — otel künyesi + yıldız + sertifika
  optional:
    - ConciergeChat                      # gerçek zamanlı (Supabase Realtime)
    - ReviewCarousel                     # TripAdvisor/Google review sync
    - SpaPaketSatis                      # otel-spa hibrit (ek paket)
    - TransferServis                     # havaalanı transfer rezervasyonu
    - SanalOdaTuruR3F                    # Tier 3+ (premium suite sanal tur)
    - I18nTrEnAr                         # TR + EN zorunlu, AR/RU Antalya/Bodrum için

anti_cliche:
  forbidden_palettes: [PL1]              # luxury dark+gold 'Welcome to X' klişesi YASAK
  forbidden_typography: [TY1, TY2, TY4, TY8]  # Playfair italic gold YASAK — Fraunces italic OK
  forbidden_heroes: [HR2, HR7]
  forbidden_patterns:
    - "gold italic 'Welcome to X' başlığı"
    - "stok foto havuz hero"
    - "Booking.com iframe (native booking akışını öldürür)"
    - "fake Instagram feed overlay"
  repeat_score_vs_existing: 1            # sadece H2 + N2 universal
  warning: |
    Luxury dark gradient + gold italic 'Welcome to X' klişesi YASAK — her butik otel aynı. Stok foto
    havuz YASAK, gerçek otel + drone video zorunlu. Booking.com iframe + rate comparison external link
    otel sitesini öldürür — native rezervasyon akışı (5 adım: tarih → oda → misafir → ekstra → ödeme)
    zorunlu. Fine-art italic başlık için Fraunces italic OK ama Playfair YASAK.

compatibility:
  forbidden_sectors: [insaat, fintech, gaming]
  conditional_sectors: [kuafor, eticaret, mucevher]
  recommended_for: [otel, spa, mucevher-el-isi, restoran-organic, gayrimenkul-butik]
  matrix_row_peers:
    default: [spa, gayrimenkul, otel]            # ✓✓
    active: [mucevher, kuafor, restoran, klinik] # ✓
    conditional: [insaat, eticaret, fotograf]    # ⚠

preview_app_route: /preview/otel-warm-organic
scaffold_command: "node scaffold.js otel-warm-organic --out ./otel-warm-organic-test/"

