# Scaffolder hints
scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  turkish_chars_test: ["ı", "İ", "ğ", "Ğ", "ş", "Ş", "ç", "Ç", "ö", "Ö", "ü", "Ü"]
  font_test_urls:
    - "Archivo Narrow Black 700-900 (display — kategori başlık + hero)"
    - "Geist Sans 300-700 (body + ürün adı + UI)"
    - "Geist Mono 400-600 (SKU + fiyat + stok kodu + birim)"
    - "Stardos Stencil 400-700 (hazard label + adet stepper)"
  wcag_contrast_target: "AA (4.5:1) — bg #D4CFC4 × ink #111 = 11.8:1 ✓ ; hazard #F5C400 × ink #111 = 12.2:1 ✓ ; orange CTA = 4.6:1 ✓"
  lighthouse_target: 90
  perf_budget: "LCP < 2.5s (ürün listesi) ; INP < 200ms (quick-add) ; First load < 200KB gzip ; ürün görsel lazy + blurDataURL"
  prefers_reduced_motion: "MANDATORY fallback — GSAP scrub off, Lenis devre dışı, gauge statik"
  product_card: "1:1 kare, sharp border 2px ink, hover alternate angle + hazard ribbon indirim, border-radius: 0"
  product_gallery: "L3 bento-no-glass desktop 4-col, L4 horizontal rails featured kategori; masonry DEĞİL (spec-yoğun)"
  product_list_row: "T7 receipt strip — görsel + SKU + ad + adet stepper + birim/toplam fiyat + sepete-ekle"
  primary_cta: "Sepete Ekle"
  secondary_cta: "Teklif Al (B2B)"
  bulk_order_cta: "Adet Kademeli İskonto"
  checkout_flow: "Sepet → Bilgi (B2C/B2B switch: VKN/TC) → Ödeme → Onay — 4 adım progress stencil numaralı"
  performance_critical: "ürün listesinde LCP < 2.5s (400+ ürün katalog için virtualized scroll tercih)"
  schema: "Product + Offer + AggregateRating + BreadcrumbList + ItemList JSON-LD — B2B için priceSpecification"
  mobile_critical: "Sticky bottom 'Sepete Ekle' + 'WhatsApp Toptan Fiyat' dual-CTA bar"
  payment: "iyzipay (Türkiye B2C/B2B) + havale/EFT seçeneği (B2B zorunlu) + carî hesap opsiyonel (bayi giriş)"
  rounded_corners: "border-radius: 0 KESIN ZORUNLU — tüm elementler sharp edge"
  shadow_signature: "offset hard shadow 4-6px (ürün kart + CTA); blur YOK"
  hazard_stripe_spec: "repeating-linear-gradient(45deg, #F5C400 0 18px, #111 18px 36px) — kampanya ribbon, indirim badge, stock-critical banner"
  concrete_speckle_spec: "radial-gradient speckle + grain.svg %6 opacity — katalog kağıt hissi"
  seo_critical: "Product + Offer schema her ürün için; kategori programmatic seo ile [kategori]+[şehir]; B2B için organization + priceSpecification"

# B2B vs B2C ayrımı
semantic_scope:
  b2c_flow: "sepet → bilgi → ödeme → onay (iyzipay); 1-10 adet; misafir checkout OK"
  b2b_flow: "teklif talep wizard → firma onay → özel fiyat → cari/EFT/kredi kartı; 10+ adet; VKN zorunlu"
  bayi_portal: "opsiyonel — bayi giriş sonrası özel fiyat + carî bakiye + toplu sipariş CSV upload"
  excluded: [ar-try, 3d-viewer, configurator]  # tedarik için gereksiz
  alternative_if_3d_needed: "premium recipe next-r3f + immersive-3d stili (mobilya/makine showcase için)"

# Sektör rationale
sector_rationale: |
  eticaret.yaml MATRIX ✓ olarak "B2B tedarik" gerekçesiyle listelendi.
  industrial-workwear stilinin compatible_sectors listesinde endustriyel-imalat, lojistik,
  toptan-malzeme, otomotiv-tamirhane var — hepsi eticaret sektörünün B2B alt-kolu.
  mucevher/klinik/spa gibi premium sektörlerde yasak ama endüstriyel commodity için native.
  PL4 concrete + TY11 stencil + T7 receipt + K9 stock gauge + F3 B2B wizard kombinasyonu
  "spec-yoğun + SKU + adet + bayi" B2B psikolojisini doğrudan destekliyor. Lüks e-ticaret için
  editorial-luxury, commodity genç marka için brutalist, admin-yoğun için data-dense-dashboard
  alternatif olarak MATRIX'te mevcut.
