  form: F1                          # Single-col Tall (randevu + paket seçim)
  modal: M1                         # Centered Dialog
  footer: FT4                       # Colophon (terapist künyesi + sertifika)

components:
  core:
    - HeroBrochureCover             # HR11 — paket kapak (HR3 video warm-organic)
