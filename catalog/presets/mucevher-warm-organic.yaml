# Stil mood — mücevher editorial-luxury default'a organik alternatif
# Konsept: Atölye + el-emeği + tactile clay palette. Dagıntaslı/Fatih Bey luxury-dark değil, zanaat-odaklı.
mood: [el-emegi, atolye, tactile, sakin, clay, ritueel, zanaat, unhurried]

atoms:
  palette: PL22                # Tobacco + Pearl — mücevher warm native, PL1 dark+gold klişesinin alternatifi
                               # Alt: PL31 Clay + Mist (atölye tactile)
  typography: TY37             # Cormorant Infant italic + Inter Tight — soft italic, zanaat warmth
                               # Alt: TY29 Schibsted Grotesk (daha modern atölye)
  hero: HR11                   # Brochure Cover Grid — koleksiyon kapak + 3-4 ürün thumbnail
                               # Alt: HR3 atölye slow-mo video (el çalışıyor — 8-12s loop)
  layout:
    - L8                       # Masonry ürün vitrin (square 1:1 crop, hover alternate angle)
    - L6                       # Center single col (ürün detay sayfası)
  motion:
    - MO2                      # Lenis smooth (lerp 0.07-0.09)
    - MO10                     # Print-first static — zanaat sessizliği
    - MO3                      # CSS scroll-driven subtle
  motion_ajans:
    - wearebrand-blur-36px-reveal        # ürün kart reveal (sakin)
    - ultra-variable-font-opsz-scroll    # Fraunces opsz 9→144 başlık scroll-linked
  header: H2                   # Masthead Centered — atölye adı + "Est. X · Kapalıçarşı"
  nav: N2                      # Horizontal Tabs Underline (Koleksiyon/Atölye/Sertifika/İletişim)
  kpi: K5                      # Almanac Editorial — "47 parça · 18 yıl · 3 usta"
  table: T3                    # Spec Sheet — sertifika, ayar, karat, taş, kesim
  form: F1                     # Single-col tall (sipariş/özel tasarım)
  modal: M1                    # Centered Dialog (ürün 3D preview)
  footer: FT4                  # Colophon editorial credits — atölye künyesi + sertifika

components:
  core:
    - HeroBrochureCover                  # HR11 — koleksiyon kapak + thumbnail grid
    - MasonryProductGallery              # L8 — square 1:1 crop, hover alternate angle
    - MastheadCentered                   # H2 — Cormorant Infant atölye adı + subtitle
    - HorizontalTabsNav                  # N2 — Koleksiyon/Atölye/Sertifika/Blog/İletişim
    - AlmanacEditorialKpi                # K5 — "47 parça · 18 yıl · 3 usta"
    - ProductSpecSheet                   # T3 — sertifika + ayar + karat + taş + kesim
    - OzelTasarimForm                    # F1 — özel sipariş (metal + taş + ölçü + mesaj)
    - ColophonFooter                     # FT4 — atölye + sertifika + SAN-TEZ + Kuyumcukent üyelik
    - BlurRevealSubtle                   # wearebrand 36px reveal sakin (0.8-1.2s)
    - VariableFontOpszScroll             # Fraunces opsz 9→144 başlık
  optional:
    - AtolyeVideoBg                      # HR3 alternatif (atölyede el çalışıyor slow-mo)
    - ProductCard3D                      # hover = alternate angle preview
    - WhatsAppChat                       # sticky mobile
    - WishlistLocalSync                  # favori + Supabase auth sync
    - IyzicoCheckout                     # ödeme (Tier 2 e-ticaret modu aktifse)
    - GaussianSplatViewer                # Tier 3+ gerçek ürün 3D scan

