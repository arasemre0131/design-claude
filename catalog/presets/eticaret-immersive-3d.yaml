  hero: HR4                  # 3D Canvas Scroll-Camera (ürün 360 scroll)
  layout:
    - L4                     # Full-bleed rails (ürün cinematic)
    - L8                     # Masonry ürün vitrin (ana kategori grid)
  motion:
    - MO1                    # GSAP ScrollTrigger (scrub 1.5 — hızlı conversion için)
    - MO2                    # Lenis smooth (lerp 0.09)
    - MO12                   # R3F postprocessing
    - MO7                    # View Transitions API (ürün → detay geçiş)
  motion_ajans:
    - lusion-glsl-noise                 # Ürün arka plan atmosferi
