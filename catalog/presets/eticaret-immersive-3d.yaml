    - ultra-porthole-dive               # Ürüne scroll yaklaşma
  3d:
    - 3D-01-drei-envmap                 # HDRI studio (ürün yansıma)
    - 3D-03-drei-presentationcontrols   # Drag to rotate (mobil kritik)
    - 3D-04-drei-contactshadows         # Ürün yere gölge
    - 3D-08-drei-meshtransmission       # Cam/akrilik ürün (parfüm, kristal mobilya)
    - 3D-09-postprocessing-bloom        # Ürün highlight
    - 3D-10-postprocessing-dof          # Arka plan blur, ürün focus
    - 3D-11-gaussian-splat              # Gerçek ürün fotogrametri (mobilya)
