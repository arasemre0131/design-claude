  nav: N10                   # Timeline scroll-locked (ürün hikayesi)
  kpi: K2                    # Band + rules — K1 K7 YASAK
  table: T3                  # Spec sheet (boyut, materyal, garanti) — T6 card grid YASAK
  chat: C1                   # Bubble chat (live support)
  form: F4                   # Inline edit (sepet)
  modal: M1                  # Centered dialog (sepete eklendi)
  footer: FT7                # Link-heavy mega footer (kategori + help center)

components:
  core:
    - Immersive3DCanvas                 # HR4 impl
    - ProductConfigurator               # Renk + materyal + boyut + canlı 3D güncelleme
    - ScrollProduct360                  # Scroll = 360 ürün rotation (GSAP scrub)
    - MeshTransmissionViewer            # Cam/akrilik materyal (parfüm, vazo)
    - GaussianSplatViewer               # Gerçek ürün (mobilya — IKEA benzeri)
    - PostprocessingStack               # Bloom + DOF + tone mapping
    - StickyAddToCart                   # 3D canvas scroll-in, sticky sepete ekle button
    - ProductDetailSpec                 # T3
    - ReviewGrid                        # Müşteri yorumları + yıldız
    - MegaFooter                        # FT7
  optional:
    - ArTryProduct                      # model-viewer (koltuk salonda göster, çanta omzunda)
    - RoomPlanner                       # Mobilya 3D odaya yerleştir (drei TransformControls)
