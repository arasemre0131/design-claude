scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  mobile_fallback: "3D skip → 6-frame 360 turntable (img sequence lazy-load) + frameloop='demand', AR butonu aktif kalır (model-viewer)"
  gpu_tier_detection: "detect-gpu tier 0-1 → 360 turntable + AR, tier 2 → düşük poly GLB + postprocess off, tier 3+ → full config"
  model_compression: "Draco + KTX2 + Meshopt ZORUNLU — tek ürün max 2MB, konfigürator variant'ları LOD"
  target_fps:
    desktop: 60
    mobile: 30
  turkish_chars_test: ["ı", "İ", "ğ", "ş", "ç", "ö", "ü", "Ç", "Ö", "Ü", "Ş"]
  font_test_urls:
    - "Unbounded 400-800 (başlık)"
    - "Manrope 300-700 (gövde)"
    - "JetBrains Mono 400 (spec)"
  wcag_contrast_target: "AA (4.5:1) + 3D canvas aria-label='Ürün 3D sahnesi, detaylar aşağıda listelenmiştir' + interactive mode için keyboard nav (ok = rotate, enter = configurator modal)"
  lighthouse_target: 85                             # 3D + konfigürator ağır — 85 hedef, mobile 70
  prefers_reduced_motion: "3D animation off, 360 turntable 1 frame static, scroll-camera skip, AR buton aktif kalır (kullanıcı manuel)"
  primary_cta: "Sepete Ekle"
  secondary_cta: "Favorilere Ekle"
  checkout_flow: "Sepet → bilgi → ödeme → onay (4 adım, iyzico embed, guest checkout)"
  performance_critical: "LCP < 2.5s (3D canvas Suspense + poster), INP < 200ms (konfigürator interact), CLS < 0.05"
  mobile_critical: "Sticky 'Sepete Ekle' bottom bar (3D canvas scroll-out'ta görünür), AR butonu 3D canvas üstünde"
  schema: "Product + Offer + AggregateRating + BreadcrumbList + 3DModel (encodingFormat=model/gltf-binary, potentialAction=viewAR) JSON-LD"
  special_features:
    - "Ürün konfigürator (renk + materyal + boyut canlı 3D)"
    - "AR ürün önizleme (iOS Quick Look USDZ + Android Scene Viewer GLB)"
    - "Gaussian Splatting (mobilya gerçek fotogrametri)"
    - "Scroll 360 rotation (GSAP scrub 1.5)"
    - "Room planner (mobilya drag-drop 3D odaya)"
    - "View Transitions (ürün grid → detay morph)"
