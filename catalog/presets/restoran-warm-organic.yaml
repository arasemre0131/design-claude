  - Mobilyacı/3d-demo/research/seo-teknik-2026.md                                  # local SEO + Restaurant JSON-LD
  - Mobilyacı/3d-demo/research/sitemap-robots-structured-data-seo-2026.md
  - Mobilyacı/3d-demo/research/accessibility-wcag-aria-2026.md
  - Mobilyacı/3d-demo/research/landing-page-conversion-patterns-2026.md
  - Mobilyacı/3d-demo/research/email-analiz.md
  - research/design-claude/mockups/a-warm-dark/index.html                          # 5/5 warm ref
  - research/design-claude/templates/04-restoran/index.html                        # sektör ref (masthead + brochure)

scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  turkish_chars_test: ["ı", "İ", "ğ", "Ğ", "ş", "Ş", "ç", "Ç", "ö", "Ö", "ü", "Ü"]
  font_test_urls:
    - "Cormorant Infant italic 400/600 (display)"
    - "Inter Tight 300-500 (body)"
  wcag_contrast_target: "AA (4.5:1) — bg #F4D5C4 × burgundy #6B1B2E = 8.6:1 AAA ✓"
  lighthouse_target: 93
  hero_assets: "yemek hazırlama video (chef kesim / plate üstü, 10-15s loop, ≤6MB)"
  menu_layout: "L5 CSS columns 3-col desktop (öğün/ara sıcak/ana/tatlı), 1-col accordion mobile"
  primary_cta: "Masa Rezerve Et"
  secondary_cta: "Menüyü Gör"
  motion_config: "Lenis lerp 0.08-0.10, CSS scroll-driven menü reveal, Fraunces opsz scroll-linked opsiyonel"
  prefers_reduced_motion: "Scroll-reveal off, immediate display + static menü fallback"
  special_note: "Menü T6 card grid YASAK — L5 newspaper 3-col zorunlu. Gold YASAK. Italic = Cormorant Infant (Playfair DEĞİL)."
  schema: "Restaurant + Menu + MenuItem + OpeningHoursSpecification + Offer JSON-LD"
  local_seo: "Restaurant + MenuItem + OpeningHoursSpecification zorunlu"
