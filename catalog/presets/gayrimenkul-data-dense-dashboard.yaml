scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  mobile_strategy: |
    Agent saha (375px) primary — müşteriye gezdirme sırasında telefondan ilan açma.
    Sidebar collapse + icon rail, ⌘K mobile alt bottom sheet "Ara".
    Dense tablo 375px → kart view (M3 bottom sheet), harita swipe overlay.
    Ofis resepsiyon (768px tablet): dense tablo + harita yan yana.
  turkish_chars_test: ["ı", "İ", "ğ", "Ğ", "ş", "Ş", "ç", "Ç", "ö", "Ö", "ü", "Ü"]
  font_test_urls:
    - "Big Shoulders Display 600-800 (KPI büyük rakam)"
    - "Inter Tight 300-700 (body, tablo)"
    - "Geist Mono 400 (tabular-nums, m², fiyat, ilan no, telefon)"
  wcag_contrast_target: "AA (4.5:1) + agent saha dış ışık için AA+ (5.5:1)"
  lighthouse_target: 90
  virtualization: "TanStack Virtual ZORUNLU — ilan 1000+ portföy, lead 500+, MLS feed 5000+"
  keyboard_nav: "j/k vim + ⌘K + / arama + g+p portföy, g+l lead, g+r randevu, g+m harita quick jump"
  tabular_nums_css: "font-variant-numeric: tabular-nums — m², fiyat, ilan no, telefon, kredi aylık"
  map_integration: "Mapbox GL JS custom style (marka tonu) + marker cluster 50+ ilan + hover preview"
  primary_cta: "Yeni İlan Ekle / Lead Kaydet"
  secondary_cta: "Randevu Planla / Müşteriye Broşür Gönder"
  special_features:
    - "⌘K palette: ilan ara (no/adres/m²/fiyat), lead ara, randevu oluştur, MLS senkron"
    - "Harita-liste hybrid (ilan listesi sol + Mapbox sağ, marker hover ilan vurgula)"
    - "Lead kaynağı tracking (Google/Instagram/web formu/MLS/referral)"
    - "Agent komisyon takip (satış × oran → otomatik kalem)"
    - "MLS feed ingestion (XML cron job + değişiklik diff log)"
    - "PDF broşür export (ilan → @react-pdf müşteri için A4 broşür)"
    - "Virtual tour embed (Matterport iframe veya R3F — premium tier)"
    - "Kredi hesaplama modal (DTI, taksit, faiz — lead engagement)"
    - "Email alert (lead filter kaydet → yeni eşleşen ilan email)"
    - "Supabase Realtime lead feed (yeni form submit → pulse notification)"
  schema: "Admin-only — customer ilan sitesi ayrı RealEstateListing + PostalAddress + GeoCoordinates + Offer JSON-LD"
  performance_critical: "Map render 500 marker < 100ms, ⌘K < 50ms, ilan filter apply < 150ms INP"
  auth_critical: |
    Supabase RLS her tabloda (listings, leads, appointments, commissions, mls_feed)
    + role-based: sahib / müdür / agent / muhasebe / stajyer
    + agent sadece kendi lead + kendi ilanlarını görür (ownership check)
    + muhasebe komisyon görür ama müşteri PII görmez
    + KVKK audit log (müşteri telefon/adres görüntüleme log)
    + MLS ingestion service_role only
  legal_critical:
    - "KVKK açık rıza (lead form + müşteri veri saklama süresi)"
    - "MLS feed atıf (kaynak ajans + orijinal link zorunlu)"
    - "Komisyon sözleşmesi digital imza (TAPU yasası)"
    - "Reklam yasası: 'yatırım garantisi' klişesi YASAK (SPK regulation)"
