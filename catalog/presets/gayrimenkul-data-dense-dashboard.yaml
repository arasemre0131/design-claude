  forbidden_typography: [TY1, TY2, TY4, TY8]
  forbidden_heroes: [HR2, HR7, HR8]
  forbidden_headers: [H8]
  forbidden_pipeline: [P1]
  forbidden_tables: [T6]              # card grid admin dense'e ters
  forbidden_layouts: [K1, L1]         # bento glass + tam-frame grid
  forbidden_chart: [CH1, CH2]
  forbidden_motion: [MO10-print-first-full, MO11-opsz-dramatic, MO1-aggressive-pin]
  forbidden_patterns:
    - "stok-foto-hero-modern-villa"                 # gayrimenkul sector warning
    - "generic-google-maps-embed"                   # Mapbox custom style zorunlu
    - "her-ilan-karti-ayni-template"                # premium villa + 2+1 daire farklı gösterim
    - "yatirim-guvencesi-altin-anahtar-klise-metin" # klişe copywrite
    - "luxury-dark-gradient-gold-italic"            # emlak klişesi
  repeat_score_vs_existing: 0         # gayrimenkul temiz sektör — benzer proje yok
  warning: |
    KRITIK: Bu preset SADECE agent CRM / iç admin — müşteri-facing ilan sitesi için
    gayrimenkul-warm-organic (default) zorunlu. Admin /admin subroute + auth.

    Lüks emlak siteleri sık sık PL1 (dark+gold) klişesine düşer (yanlış — güven kırar).
    Bu preset PL35 Sand+Ocean ile sıcak-güven + admin dense dili birleştiriyor.

    Agent CRM'de KVKK kritik: müşteri PII (telefon/adres) sadece ilgili agent görür (RLS).
    Komisyon bilgisi sahip + agent arası (muhasebe role ayrı).

    MLS feed ingestion varsa hukuki: başka ofisin ilanını kendi gibi göstermek YASAK —
    kaynak atıf + orijinal ajans linki zorunlu.

