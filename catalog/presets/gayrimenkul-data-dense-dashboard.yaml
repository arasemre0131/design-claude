# Konsept: Emlak agent CRM / MLS admin / ofis portföy yönetimi.
# KRITIK: Bu preset SADECE agent iç panel — müşteri-facing ilan sitesi için warm-organic (default) kullan.
# Ofis zinciri (Remax, Century21 alternatifi) veya bağımsız emlak ofisi iç kullanım:
# Portföy yönetimi, lead pipeline, randevu gösterme, komisyon takip, MLS feed ingestion.
mood: [compact, agent-ops, monospace-stat, calm-ink, map-sidebar-hybrid, tabular-nums]

atoms:
  palette: PL35                       # Sand + Ocean — gayrimenkul recommended + light linear uyumlu
                                      # Sand bg (sıcak-güven) + ocean ink (profesyonel) + acid green "satıldı" signal
                                      # Alt: linear-style FCFCFC (daha nötr admin), PL36 Mist+Sunset (tab görünüm)
  typography: TY42                    # Big Shoulders + Inter Tight + Geist Mono — gayrimenkul recommended
                                      # Big Shoulders sadece KPI büyük rakamda, Inter Tight body, Geist Mono tablo
                                      # Alt: TY41 Fraunces + IBM Plex (daha editorial ama admin için fazla dekoratif)
  hero: HR14                          # Zero-Hero receipt strip — "Aktif ilan 48 · yeni lead 12 · görüntüleme 3.2K · bugün randevu 4"
                                      # HR2 split + HR9 interactive map müşteri-facing için; admin'de HR14 direkt giriş
  layout:
    - L7                              # Sticky Sidebar + Feed — sol rail: Portföy/Lead/Randevu/Agent/Rapor/MLS
    - L3                              # Bento-no-glass fallback — KPI overview + mini map widget
  motion:
    - MO4                             # Framer layoutId — ilan kart morph, filter reactive
    - MO8                             # WAAPI — command palette, map marker hover
    - MO3                             # CSS scroll-driven — sticky header shadow
    - MO7                             # View Transitions API — ilan detay geçiş (gayrimenkul recommended)
  motion_ajans: []                    # admin dense minimal motion
  header: H3                          # Sidebar Rail + Breadcrumb — "Portföy / Kadıköy / Moda / 3+1 villa"
  nav: N5                             # Command Palette ⌘K — "İlan ara", "Lead git", "Randevu oluştur", "MLS senkron"
                                      # Alt: N2 horizontal tabs (Portföy/Lead/Satış/Kiralama)
  kpi: K3                             # Chip Row colored blocks — hazard chip "satıldı/aktif/beklemede/kiralık"
                                      # Alt: K8 inline sparkline (lead trend), K5 almanac (aylık performans)
  pipeline: P8                        # Dense Table — lead pipeline "İlk temas → Gösterim → Teklif → Kapora → Satış"
                                      # P1 klasik kanban YASAK (sales kanban klişesi)
  table: T2                           # Linear Issue Dense — ilan listesi: no / başlık / tip / m² / fiyat / status / agent
                                      # Alt: T4 filterable stream (MLS feed log), T3 spec sheet (ilan detay küçük)
  chart: CH11                         # D3 column bar — aylık satış/kiralama bar chart
                                      # Alt: CH10 sparkline-only (lead trend), CH7 stacked bar (kategori breakdown)
  form: F4                            # Inline Edit — ilan fiyat, durum, agent değiştir tablo içi
  modal: M5                           # Inline Expand — ilan satır aç → foto + harita + özellik tab
                                      # Alt: M3 Bottom sheet (mobile agent)
  footer: FT5                         # Contact Card single line — destek + versiyon + ofis bilgisi

components:
  core:
    - ZeroHeroReceiptStripGayrimenkul # HR14 — aktif ilan · yeni lead · günlük görüntüleme · randevu · MLS senkron durum
    - StickySidebarFeedEmlak          # L7 — Dashboard/Portföy/Lead/Randevu/Agent/Rapor/MLS/Ayarlar
    - SidebarRailHeaderBreadcrumb     # H3 — ofis seçici (multi-location) + arama + ⌘K tetik
    - CommandPaletteCmdK              # N5 — "/i ilan #1248", "/l lead ara", "/r randevu oluştur", "/m MLS"
    - ChipRowKpiColored               # K3 — aktif/satıldı/kiralık/beklemede colored chip
    - IlanLinearDenseTable            # T2 — portföy: no/başlık/tip/m²/fiyat/durum/agent/güncelleme
    - LeadPipelineDenseTable          # P8 — lead: ad/kaynak/ilgilenilen ilan/aşama/son temas/agent
    - MapSidebarHybrid                # sol ilan liste + sağ Mapbox harita (marker cluster)
    - D3ColumnBarChart                # CH11 — aylık satış/kiralama bar
    - InlineEditIlanRow               # F4 — fiyat/durum/agent tabloda edit + ⌘S
    - InlineExpandIlanDetail          # M5 — ilan satır aç → foto carousel + floor plan + m² + harita mini
    - ContactCardFooter               # FT5 — destek + ofis telefon + versiyon
  optional:
    - MapboxClusterMarkerL5           # L5-variant — harita + sidebar dual view
    - VirtualTourIframe3DOptional     # premium tier — R3F veya Matterport embed (Tier 3+)
    - MLSFeedIngestionLog             # T4 — "MLS → 42 yeni ilan eklendi · 14:22" activity stream
    - AgentPerformanceLeaderboard     # aylık agent sıralama (komisyon bazında)
    - KomisyonTakipCalculator         # oran × satış → komisyon otomatik hesap
    - CreditCalculatorModal           # M1 — kredi hesaplama (DTI, taksit, faiz)
    - EmailAlertSubscriber            # lead filter kaydet → yeni eşleşen ilan email
    - DroneVideoThumbGrid             # ilan premium (Tier 3+)
    - FloorPlanInteractiveSVG         # oda tıkla → foto (premium)
    - ExportPdfIlanBrochure           # müşteri için PDF broşür (@react-pdf)

anti_cliche:
