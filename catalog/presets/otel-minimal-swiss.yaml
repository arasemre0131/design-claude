  wcag_contrast_target: "AA (4.5:1) + oda foto üstü overlay 7:1"
  lighthouse_target: 95
  bundle_size_target: "< 180KB first load"
  primary_cta: "Rezervasyon Yap"
  secondary_cta: "Odaları İncele"
  booking_flow: "Tarih → oda tipi → misafir sayısı → ekstra (yemek/spa) → ödeme (5 adım F1)"
  i18n_critical: "TR + EN minimum; Arapça + Rusça Tier 4 (Antalya/Bodrum müşteri profili)"
  schema: "LodgingBusiness + Hotel + Room + Offer + Review JSON-LD"
  mobile_critical: "Sticky 'Rezervasyon' bottom bar, tarih picker tam ekran modal M1"
