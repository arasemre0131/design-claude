scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  mobile_strategy: |
    Saha mühendisi tablet (768px) primary use case — sidebar rail collapse,
    sağ icon only, command palette her yerde accessible.
    Saha telefon 375px için "Saha" sekmesi: foto yükle + iş emri tick + mini harita.
    Dense table 375px → kart view fallback (M3 bottom sheet expand).
  turkish_chars_test: ["ı", "İ", "ğ", "Ğ", "ş", "Ş", "ç", "Ç", "ö", "Ö", "ü", "Ü"]
  font_test_urls:
    - "Rubik Mono One (display, şantiye proje başlığı)"
    - "Inter Tight 300-700 (body)"
    - "JetBrains Mono 400 (tabular-nums, BOM kod, iş emri no, bütçe tutar)"
  wcag_contrast_target: "AA (4.5:1) — saha tablet dış ışık için AA+ (5.5:1) tercih"
  lighthouse_target: 90
  virtualization: "TanStack Virtual ZORUNLU 200+ satır (iş emri, tedarikçi, malzeme BOM, saha foto feed)"
  keyboard_nav: "j/k vim + ⌘K + / arama + g+d dashboard, g+p projeler, g+i iş emri quick jump"
  tabular_nums_css: "font-variant-numeric: tabular-nums — tüm bütçe/yüzde/tarih/iş emri no alanlarında"
  primary_cta: "Yeni İş Emri / Proje Oluştur"
  secondary_cta: "Saha Fotoğrafı Yükle / Raporu İndir"
  special_features:
    - "⌘K command palette — 'proje ara', 'iş emri #42', 'tedarikçi ekle', 'saha foto'"
    - "Supabase Realtime saha activity (foto yüklendiğinde canlı toast)"
    - "File upload saha foto (Supabase Storage + EXIF date/GPS metadata)"
    - "PDF export (aylık proje raporu, jsPDF + react-pdf)"
    - "KVKK audit log (kim ne zaman hangi dosyayı gördü)"
    - "Offline-first PWA (saha internet zayıf — IndexedDB + background sync)"
    - "Role-based access: sahib / şantiye-şefi / mühendis / muhasebe / tedarikçi portal"
  schema: "Internal admin — SEO gerekmez (robots.txt Disallow: /)"
  performance_critical: "Table render < 16ms/row, ⌘K < 50ms, saha foto upload progress < 200ms INP"
  auth_critical: |
    Supabase RLS her tabloda (project_members + row-level ownership)
    + service_role server-only + audit_log tablosu (insert trigger)
    + şantiye-şefi sadece kendi projelerini görür (ownership check)
    + mühendis iş emri oluşturabilir, tedarikçi sadece kendi siparişlerini görür
