# Scaffolder hints
scaffold_hints:
  mobile_breakpoint: [375, 768, 1280]
  turkish_chars_test: ["ı", "İ", "ğ", "Ğ", "ş", "Ş", "ç", "Ç", "ö", "Ö", "ü", "Ü"]
  font_test_urls:
    - "Archivo Narrow Black 700-900 (display — hero wordmark + section titles)"
    - "Archivo Black 900 (fallback display)"
    - "Geist Sans 300-700 (body + UI)"
    - "Geist Mono 400-600 (spec / timestamp / terminal)"
    - "Stardos Stencil 400-700 (hazard label + plate numerik)"
  wcag_contrast_target: "AA (4.5:1) — bg #D4CFC4 × ink #111 = 11.8:1 ✓ ; hazard #F5C400 × ink #111 = 12.2:1 ✓ ; orange #E85D04 × concrete = 4.6:1 ✓"
  lighthouse_target: 90
  perf_budget: "First load < 180KB gzip; concrete speckle + hazard stripe + Lenis production; Mapbox static tile fallback"
  prefers_reduced_motion: "MANDATORY fallback — GSAP pin-scrub off, Lenis devre dışı, gauge needle statik, timeline scroll-snap"
  hero_assets: "gerçek şantiye drone video (16:9, 12-15s loop, muted autoplay, ≤6MB) VEYA Mapbox/MapLibre interactive proje haritası (custom industrial style)"
  primary_cta: "Keşif Randevusu Al"
  secondary_cta: "Aktif Projeleri Gör"
  trust_badges: "TSE · ISO 9001 · OHSAS 18001 · ÇED uygun — footer stripe + about page"
  hazard_stripe_spec: "repeating-linear-gradient(45deg, #F5C400 0 18px, #111 18px 36px) — kullanım: header top, footer top, CTA underline, warning callout"
  concrete_speckle_spec: "radial-gradient(circle at 20% 30%, rgba(0,0,0,0.08) 0 1px, transparent 1px) multi-layer + grain.svg %6 opacity"
  rounded_corners: "border-radius: 0 KESIN ZORUNLU — tüm elementler sharp edge (industrial imza)"
  shadow_signature: "offset hard shadow 6-8px (solid, blur YOK) — plate elements + CTA + card"
  safety_badge_placement: "Footer sabit sticky satır + about page grid + hero altı trust row"
  payment_note: "İnşaat sitesi ödeme entegre gerekmez — sadece iletişim + randevu formu. Opsiyonel: proje bedel pay-link (iyzipay simplepay)"
  mobile_critical: "Sticky bottom 'Keşif Randevusu Al' bar — tek tap ile WhatsApp + form seçeneği"
  seo_critical: "LocalBusiness + Project (CreativeWork) + Review JSON-LD zorunlu; Ankara/İstanbul şehir sayfaları programmatic seo ile çoğaltılabilir"

# Müşteri-facing vs CRM ayrımı
semantic_scope:
  included: [tanıtım, proje-galerisi, harita, keşif-randevu, referans, blog, sertifika, ekip, iletişim]
  excluded: [crm, is-emri, saha-foto-upload, musteri-portal, multi-tenant, observability]
  crm_alternative_preset: "data-dense-dashboard recipe — enterprise tier (80K+ TL)"

# Sektör istisnası
sector_rationale: |
  insaat.yaml recommended atom listesi ile 5/8 match (PL4, TY11, HR9, MO1/MO2, FT8).
  mockup-C referans score 4.5/5 olarak industrial-workwear imzasını kanıtlıyor.
  Rounded corners YASAK + hazard stripe + concrete speckle + stencil label inşaat sektörünün
  psikolojik tonunu (sağlamlık + şeffaflık + hazard + görünürlük + güven) doğrudan karşılıyor.
  mucevher/kuafor/klinik/spa/otel gibi premium/feminen sektörler için UYGUN DEĞİL (atölye hissi yaratır).
