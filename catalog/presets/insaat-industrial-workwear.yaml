---
id: insaat-industrial-workwear
sector: insaat
style: industrial-workwear
recipe: next-premium
tier: mid
budget_range_try: [15000, 30000]
delivery_weeks: [2, 3]
status: active  # MATRIX ✓✓ — DEFAULT for insaat (concrete + hazard + stencil native şantiye dili)
