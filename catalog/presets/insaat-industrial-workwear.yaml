# Stil mood — şantiye / atölye native dili
# Konsept: concrete bg + hazard sarı-siyah stripe + stencil plaka + safety orange.
# Orta-büyük inşaat firması müşteri-facing tanıtım sitesi (Ankara proje lokasyonları, TSE/ISO ağırlıklı).
# CRM değil, tanıtım + iletişim + proje galerisi. Enterprise CRM için → data-dense-dashboard.
mood: [concrete-industrial, hazard-stripe, stencil-plate, work-safety, raw-utilitarian, blueprint-measure]

# Atom seçimi — industrial-workwear compatible + insaat native + anti-cliché pass
atoms:
  palette: PL4                    # Concrete #D4CFC4 + Safety Orange #E85D04 + Hazard #F5C400 + Ink #111
                                  # Alt: PL21 Ozalit Blueprint (daha editorial/ozalit); PL19 Steel+Copper (zanaat)
  typography: TY11                # Archivo Narrow Black + Geist Sans + Stardos Stencil + Geist Mono
                                  # Alt: TY26 Rubik Mono One + Manrope (chunky+kinetic uyumlu); TY5 Syne (ozalit)
  hero: HR9                       # Interactive Map — Ankara/İstanbul proje lokasyonları (insaat native)
                                  # Alt: HR13 Blueprint Title Block (teknik-çizim variant); HR5 Sign Board (küçük firma)
  layout:
    - L4                          # Full-bleed horizontal rails — şantiye aşama stage akışı
    - L1                          # Standart 12-col — proje galerisi + referans grid (ikincil sayfalar)
  motion:
    - MO1                         # GSAP ScrollTrigger — sharp reveal (industrial preferred)
    - MO2                         # Lenis smooth scroll (lerp 0.08-0.12 — fazla sakin değil)
    - MO3                         # CSS scroll-driven — hafif parallax fallback
  motion_ajans:
    - ultra-svg-feturbulence-grain    # Concrete speckle texture (radial-gradient + düşük opacity turb)
    - fraxbit-clip-path-reveal        # Industrial reveal — sharp edge clip path (sticker feel)
    - wearebrand-lenis-gsap-bridge    # Lenis+GSAP ticker bridge — marquee header için
  header: H1                      # Plate + Hazard Strip — concrete plate arkaplan + üst hazard çizgi
  nav: N4                         # Mega Menu Full-Width — "Projeler / Hizmetler / Ekip / Sertifika / İletişim"
  kpi: K9                         # Barometer Dial — analog gauge (proje tamamlanma %, aktif şantiye sayısı)
                                  # Alt: K12 Blueprint stat (ozalit çizim tarzı), K3 Chip Row (sticker)
  pipeline: P5                    # Horizontal Timeline — proje aşama pin-scrub (1987 → 2026 şirket geçmişi)
                                  # Alt: P2 Blueprint step (ozalit teknik)
  table: T7                       # Receipt Strip — şantiye teslim tutanağı / malzeme listesi (receipt feel)
                                  # Alt: T3 Spec Sheet (BOM); T6 YASAK (globally forbidden)
  chat: C4                        # Terminal Log — iş emri / saha raporu formatı (mono + timestamp)
                                  # Opsiyonel — yoğun CRM ise enterprise recipe tercih
  chart: CH6                      # Column Bar Elevation blueprint — proje m²/teslim sürü dashed grid
                                  # Alt: CH11 Stacked area (zaman ekseni)
  form: F3                        # Wizard Steps — Keşif Randevusu 4-adım (lokasyon → proje tipi → metrekare → iletişim)
  modal: M3                       # Bottom Sheet — mobile proje detay + drone video embed
  footer: FT8                     # Slab Dark Info-Strip + hazard stripe — endüstriyel ağır footer

# Components (scaffolder için)
components:
  core:
    - InteractiveProjectMap           # HR9 impl — Mapbox/MapLibre Türkiye, pin cluster proje fotoğraf popup
    - SignBoardRotated                # HR5 fallback — -1.5deg rotate, 8px hard shadow, hazard çerçeve
    - HazardStripe                    # Chrome — repeating-linear-gradient(45deg, #F5C400 18px, #111 18px)
    - ConcreteSpeckleGrain            # Layer — radial-gradient speckle + %6 grain overlay (SVG turbulence DEĞİL)
    - PlatePlusHazardHeader           # H1 impl — concrete plate bg + üst hazard strip + ISO/TSE badge satırı
    - MegaNavInsaat                   # N4 impl — 5-col (projeler / hizmetler / süreç / ekip / iletişim)
    - BarometerGaugeKpi               # K9 impl — analog gauge SVG, GSAP needle rotate on scroll
    - TimelineMilestonesPin           # P5 impl — 1987 → 2026 şantiye dönüm noktaları, scrub
    - ReceiptStripTable               # T7 impl — şantiye tutanak formatı (sipariş no / parça / adet / imza)
    - TerminalLogSahaRapor            # C4 impl — mono font + timestamp, saha raporu stream
    - ColumnBarBlueprint              # CH6 impl — dashed grid + scale bar + GSAP grow (blueprint-style)
    - WizardKesifRandevu              # F3 impl — 4-adım numbered, stencil başlık
    - BottomSheetProjeDetay           # M3 impl — mobile drone video + proje BOM tab
    - SlabDarkFooter                  # FT8 impl — #111 bg + hazard top stripe + sitemap + TSE/ISO row
  optional:
    - SafetyBadgeRow                  # TSE + ISO 9001 + OHSAS 18001 logo şeridi (sticky footer üstü)
    - BlueprintTitleBlockHero         # HR13 alternatif — kurumsal 20+ yıllık firma için teknik-çizim variant
    - DroneVideoEmbed                 # Hero bg — 16:9 muted autoplay loop 12-15s, ≤6MB
    - StencilSectionDivider           # Stardos Stencil büyük bölüm ayraç ("01 / PROJELERIMIZ" gibi)
    - WritingModeRail                 # N7 alternatif sağ kenar "01 AKTIF / 02 TAMAMLANAN / 03 GELECEK"

# Anti-cliché check
anti_cliche:
  forbidden_palettes: [PL1]                         # global dark+gold yasak (insaat'ta zaten yoktu ama pekiştir)
  forbidden_typography: [TY1, TY2, TY4, TY8]        # insaat sector anti_cliche (global yasak ID'ler)
  forbidden_heroes: [HR2, HR7, HR8]                 # split hero + dashboard hero + chat hero
  forbidden_layouts: []
  forbidden_kpi: [K1]                               # bento glass (insaat sector warning + global yasak)
  forbidden_tables: [T6]                            # card grid (globally forbidden)
  forbidden_patterns:
    - "stok safety-vest adamı hero (Unsplash) — gerçek proje fotoğrafı veya drone"
    - "mavi dalga hero + '20 yıldır' klişe metni"
    - "Dribbble turuncu/siyah SaaS dashboard klişesi"
    - "glassmorphism + rounded corners (border-radius: 0 zorunlu)"
    - "aurora-drift / warm-fade / elastic motion (endüstriyel disiplin kırar)"
  repeat_score_vs_existing:
    mockup-C-industrial: 2           # TY11 + PL4 ortak (2 kolon) — ama hero HR9 (map) + K9 gauge + P5 pipeline + T7 receipt farklı
    v2-blueprint: 3                  # MO1 + FT8-yakın + blueprint dil — ama PL21→PL4 + TY5→TY11 + HR13→HR9 ayırır
    insaat-crm-b-edge: 4             # Lenis+GSAP+Hazard+Concrete stack overlap — ama müşteri-facing vs iç CRM semantik farklı
    v2-neobrutalist: 1               # sadece hazard stripe dili ortak, combo bambaşka
  warning: |
    mockup-C (industrial) referans score 4.5/5 ile TY11 + PL4 atom seviyesinde ortak — 2 kolon.
    Ama HR9 interactive map + K9 barometer gauge + P5 timeline + T7 receipt strip + C4 terminal log farklı,
    5+ yeni atom ile özgün kalıyor. insaat-crm/b-edge (Lenis+GSAP production referansı) ile motion stack overlap
    yüksek (MO1+MO2+ajans) ama müşteri-facing tanıtım siteleri için dil doğal. Yeni projede palette
    opsiyonel olarak PL21 ozalit blueprint'e kaydırılabilir — concrete tekrar hissini kırar.

# Compatibility notes
compatibility:
  forbidden_sectors: [mucevher, kuafor, klinik, spa, fotograf, gayrimenkul, otel]  # industrial-workwear 7 forbidden
  conditional_sectors: []                                                           # insaat için koşul yok — direkt default
  recommended_for: [insaat, eticaret]                                               # eticaret B2B tedarik için ✓
  notes:
    - "DEFAULT insaat stili — şantiye native dili (concrete + hazard + stencil)"
    - "Orta-büyük firma tanıtım sitesi (3-5 hafta) için ideal"
    - "Enterprise CRM (Yıldız İnşaat tarzı multi-tenant, iş emri, saha foto) için → data-dense-dashboard recipe"
    - "Şantiye tanıtımı ≠ CRM — müşteri-facing preset (keşif randevusu + proje galerisi + harita)"
    - "Genç/design-forward firma için alternatif → insaat-brutalist (bold sticker + sharp shadow)"
    - "Kurumsal 20+ yıllık firma için → HR13 blueprint title block tercih (daha ozalit/editorial)"
    - "Zanaat atölye (ahşap işleri, tuğla restorasyon) için → warm-organic conditional ⚠"

