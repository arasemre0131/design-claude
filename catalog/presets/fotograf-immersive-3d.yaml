  gpu_tier_detection: "detect-gpu tier 0-1 → video fallback + masonry, tier 2 → tek Gaussian Splat + postprocess off, tier 3+ → full sahne"
  model_compression: "Gaussian Splat compression (.splat binary) — 15K-30K point max (5-10MB), GLB Draco + KTX2 toplam max 8MB"
  target_fps:
    desktop: 60
    mobile: 30
  turkish_chars_test: ["ı", "İ", "ğ", "ş", "ç", "ö", "ü", "Ç", "Ö", "Ü", "Ş"]
  font_test_urls:
    - "IBM Plex Sans 300-700 (monolithic family)"
    - "Inter Tight 400 (caption, meta)"
