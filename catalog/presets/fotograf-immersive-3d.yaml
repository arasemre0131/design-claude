  header: H9                 # Corner brackets — H8 BG Foto YASAK
  nav: N10                   # Timeline scroll-locked
  kpi: K2                    # Band + rules (opsiyonel — "250 düğün, 5 yıl") — K1 K7 YASAK
  table: T3                  # Spec sheet (lens + makine + teslim formatı)
  chat: C3                   # Email threaded (rezervasyon)
  form: F4                   # Inline edit
  modal: M1                  # Centered (foto detay)
  footer: FT4                # Colophon editorial

components:
  core:
    - Immersive3DCanvas                 # HR4 impl
    - GaussianSplatScene                # IMZA — gerçek mekan scan (düğün salonu, mimari)
    - SceneCameraPath                   # Scroll-linked kamera (sahnede tur)
    - PostprocessingStack               # Film grain + bloom düşük + vignette + DOF
    - MasonryGallery                    # L8 — geleneksel foto galerisi (scroll down'da açılır)
    - PhotoDetailOverlay                # View Transitions (grid → fullscreen)
    - SilentTypography                  # IBM Plex Sans 400 — başlık sessiz, foto kahraman
    - SpecSheet                         # T3 — teknik bilgi (lens, makine, teslim)
    - ColophonFooter                    # FT4
  optional:
    - VR360Viewer                       # Equirectangular HDR (düğün salonu 360)
    - ClientGalleryProtected            # Password-protected (bcrypt) — download kontrol
    - BookingForm                       # Tarih + paket + iletişim
    - CinematicIntro                    # İlk load intro animation (2-3s, skip button)

