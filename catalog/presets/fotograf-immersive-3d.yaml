  hero: HR4                  # 3D Canvas Scroll-Camera (mekan scan → galeri)
  layout:
    - L4                     # Full-bleed rails (immersive sahne)
    - L8                     # Masonry (geleneksel fotoğraf galerisi altta)
  motion:
    - MO1                    # GSAP ScrollTrigger (scrub 2 — sinematik)
    - MO2                    # Lenis smooth (lerp 0.06 — yavaş + zarif)
    - MO12                   # R3F postprocessing (film grain, vignette)
    - MO7                    # View Transitions (foto → detay morph)
  motion_ajans:
    - lusion-glsl-noise                 # Film grain shader (postprocess)
    - ultra-porthole-dive               # Sahneye scroll girişi
  3d:
    - 3D-01-drei-envmap                 # HDRI (gerçek mekan aydınlatma)
    - 3D-02-drei-orbitcontrols          # Sahne 360 orbit (düğün mekanı, mimari)
    - 3D-04-drei-contactshadows         # Sahne içi object shadows
    - 3D-09-postprocessing-bloom        # Düşük (0.4) — sessiz ışık
    - 3D-10-postprocessing-dof          # Sinematik bokeh
    - 3D-11-gaussian-splat              # KRITIK — gerçek mekan fotogrametri (düğün lokasyon, mimari)
