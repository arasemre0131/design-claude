  lighthouse_target: 88                             # Gaussian Splat ağır ama foto + next/image hızlı
  prefers_reduced_motion: "Cinematic intro skip, scroll-camera static pose, Gaussian Splat 1 frame render (frameloop='never'), film grain off"
  image_optimization: "Cloudinary CDN + next/image + AVIF/WebP + LQIP blur, Gaussian Splat sonrası klasik galeri fallback"
  primary_cta: "Portfolyoyu Keşfet"
  secondary_cta: "Rezervasyon"
  performance_critical: "LCP < 3s (3D canvas poster + Suspense), CLS < 0.05"
  schema: "ImageGallery + Photograph + Person (photographer) + Place (GaussianSplat sahne için mainEntity) JSON-LD"
  special_features:
