    italic gradient başlık YASAK, gold vurgu YASAK. 3D sahne Gaussian Splat ile gerçek mekan scan
    (düğün salonu, mimari) — synthetic 3D rendering fotoğrafçı context'inde yapay durur. BG Foto
    combo'su (H8+HR2+K1+TY2+PL1) tam yasak örneği. Scroll-camera path yavaş (scrub 2+) — sinematik
    nefes ritmi. Film grain shader (MO12 lusion-glsl-noise) imza.

