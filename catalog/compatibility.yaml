# ============================================================
# REPEAT-GUARD SKORLAMA KURALLARI
# validate-combo.js check 2 → bu tabloya bakar
# ============================================================
repeat_guard_rules:
  score_0_3:
    level: PASS
    symbol: "✓"
    action: "OK — farklı, geç"
  score_4_5:
    level: WARN
    symbol: "⚠"
    action: "İkinci tur gözden geçir"
  score_6_7:
    level: WARN2
    symbol: "⚠⚠"
    action: "En az 3 kolon değiştir"
  score_8_plus:
    level: FAIL
    symbol: "✗"
    action: "RED — combo yeniden türetilmeli"
  max_retry: 2
  columns_checked: [header, nav, hero, kpi, pipeline, table, chat, chart, form, modal, footer, typography, palette, layout, motion]

