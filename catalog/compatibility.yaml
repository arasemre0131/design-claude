# ============================================================
# FORBIDDEN COMBINATIONS (10×10 matrix'te ✗ hücreler)
# Hedef: 20 hücre
# ============================================================
forbidden_combinations:
  # --- brutalist × incompatible sektörler (6) ---
  - sektör: mucevher
    stil: brutalist
    reason: "Raw + saturated primary renk mücevher premium/el-emeği havasını kırar. styles/brutalist.yaml: incompatible_sectors."
  - sektör: klinik
    stil: brutalist
    reason: "Raw brutalist + hard shadow hasta güvenini kırar, tedirginlik yaratır. brutalist.yaml incompatible."
  - sektör: kuafor
    stil: brutalist
    reason: "Hijyen için concrete/industrial tekstür UYMAZ (sectors/kuafor.yaml warning). Raw brutalist sıcak-karşılama psikolojisine ters."
  - sektör: spa
    stil: brutalist
    reason: "Raw + sharp shadow + primary renk spa huzur/sessizlik beklentisiyle çelişir. brutalist.yaml incompatible."
  - sektör: gayrimenkul
    stil: brutalist
    reason: "Raw brutalist premium emlak algısına uymaz, yatırım-güveni için güvenilir + lokasyon gerekir."
  - sektör: otel
    stil: brutalist
    reason: "Raw + primary luxury/butik otel algısına uymaz. brutalist.yaml incompatible_sectors."

  # --- immersive-3d × minimal/statik sektörler (3) ---
  - sektör: kuafor
    stil: immersive-3d
    reason: "Saç kesimi 3D render yapay. sectors/kuafor.yaml budget_tiers premium suitability ✗."
  - sektör: restoran
    stil: immersive-3d
    reason: "2D food photography daha iştah açıcı, 3D yemek render yapay. sectors/restoran.yaml 3d_spline: no."
  - sektör: spa
    stil: immersive-3d
    reason: "Spa fiziksel deneyim, 3D render mesafe yaratır. sectors/spa.yaml 3d_spline: no + premium suitability ✗."

  # --- maximalist-atmospheric × disiplin-gerektiren sektörler (4) ---
  - sektör: insaat
    stil: maximalist-atmospheric
    reason: "Aurora + overlap endüstriyel disiplin + güven değil. sectors/insaat.yaml maximalism: no."
  - sektör: klinik
    stil: maximalist-atmospheric
    reason: "Dense atmospheric + kinetic overlay medikal güveni kırar. sectors/klinik.yaml maximalism: no + forbidden_motion."
  - sektör: spa
    stil: maximalist-atmospheric
    reason: "Dense + aurora + italic overlap spa sessizlik/huzur değil. maximalist.yaml incompatible klinik/spa."
  - sektör: gayrimenkul
    stil: maximalist-atmospheric
    reason: "Güven + netlik gerekli. sectors/gayrimenkul.yaml maximalism: no."

  # --- industrial-workwear × premium/luxury sektörler (7) ---
  - sektör: mucevher
    stil: industrial-workwear
    reason: "Hazard stripe + concrete bg mücevher premium algısına ters. industrial.yaml incompatible mucevher-premium."
  - sektör: kuafor
    stil: industrial-workwear
    reason: "Concrete bg + stencil kuaför sıcak-karşılama mood'una ters. sectors/kuafor.yaml warning: 'industrial tekstür UYMAZ'."
  - sektör: klinik
    stil: industrial-workwear
    reason: "Hazard + stencil klinik premium algısına ters. industrial.yaml incompatible klinik-premium."
  - sektör: spa
    stil: industrial-workwear
    reason: "Concrete + hazard spa huzuruna ters. industrial.yaml incompatible spa."
  - sektör: fotograf
    stil: industrial-workwear
    reason: "Görsel-öncelik + sessiz tipografi fotoğrafçı portfolyosu için — hazard stencil gürültülü."
  - sektör: gayrimenkul
    stil: industrial-workwear
    reason: "Yaşam-tarzı + yatırım güveni için concrete/hazard değil sand/ocean organik palette."
  - sektör: otel
    stil: industrial-workwear
    reason: "Kaçış/lüks-erişilebilir için hazard stripe + concrete OTEL değil atölye hissi."

# ============================================================
# CONDITIONAL COMBINATIONS (10×10 matrix'te ⚠ hücreler)
# Koşulu sağlıyorsa OK, aksi takdirde kontrol et
# Hedef: 20 hücre
# ============================================================
conditional_combinations:
  # --- brutalist ⚠ (2) ---
  - sektör: restoran
    stil: brutalist
    condition: "Street food / kreatif fast food (ramen-ya, taco, pizza) için OK ama fine dining için ✗. Bistro/fine dining'te editorial-luxury tercih."
  - sektör: fotograf
    stil: brutalist
    condition: "Kreatif moda/portfolyo brutalist OK ama sessiz belgesel/düğün fotoğrafçısı için kullanılmaz."

  # --- editorial-luxury ⚠ (2) ---
  - sektör: insaat
    stil: editorial-luxury
    condition: "CRM/admin paneli için uygun, şantiye tanıtımı için industrial-workwear tercih edilir. sectors/insaat.yaml editorial/print alt-koluna kayar."
  - sektör: eticaret
    stil: editorial-luxury
    condition: "Lüks e-ticaret (mücevher, premium mobilya, butik moda) için ✓ ama commodity/mass e-ticaret için maximalist/data-dense tercih edilir."

  # --- kinetic-agency ⚠ (4) ---
  - sektör: mucevher
    stil: kinetic-agency
    condition: "Mücevher fashion-editorial yönelirse OK (variable opsz scroll) ama zarafet kaybı riski — editorial-luxury default önerilir."
  - sektör: restoran
    stil: kinetic-agency
    condition: "Kreatif kokteyl/bar/şef-driven restoran için OK. Aile lokantası/terroir için editorial-luxury tercih."
  - sektör: gayrimenkul
    stil: kinetic-agency
    condition: "Butik/design-forward emlak ofisi için OK. Genel portföy için güven odaklı editorial-luxury tercih."
  - sektör: otel
    stil: kinetic-agency
    condition: "Butik design hotel için OK. Resort/aile oteli için warm-organic veya editorial-luxury tercih."

  # --- maximalist-atmospheric ⚠ (2) ---
  - sektör: mucevher
    stil: maximalist-atmospheric
    condition: "Kampanya sayfası (koleksiyon launch) için OK. Kök portföy için editorial-luxury tercih."
  - sektör: eticaret
    stil: maximalist-atmospheric
    condition: "Genç marka (Liquid Death tarzı) + kampanya landing için ✓. Klasik e-ticaret için ✗."

  # --- warm-organic ⚠ (3) ---
  - sektör: eticaret
    stil: warm-organic
    condition: "Doğal/organik ürün e-ticareti (sabun, zanaat mobilya, el-örme) için OK. Genel e-ticaret için warm yavaş Lenis friction yaratır."
  - sektör: fotograf
    stil: warm-organic
    condition: "Doğa/natural/botanik fotoğrafçı için OK. Moda/ticari fotoğrafçı için minimal-swiss tercih."
  - sektör: insaat
    stil: warm-organic
    condition: "Zanaat-tarzı atölye (ahşap işleri, tuğla restorasyon) için OK. Endüstriyel şantiye için industrial-workwear tercih."

  # --- data-dense-dashboard ⚠ (2) ---
  - sektör: klinik
    stil: data-dense-dashboard
    condition: "Hastane admin / randevu yönetimi / hasta portalı için ✓. Klinik tanıtım sitesi için editorial-luxury tercih — müşteri-facing."
  - sektör: gayrimenkul
    stil: data-dense-dashboard
    condition: "Agent portal / CRM / iç kullanım için ✓. Müşteri-facing ilan sitesi için warm-organic veya editorial tercih."

  # --- editorial-print ⚠ (5) ---
  - sektör: insaat
    stil: editorial-print
    condition: "v2-blueprint ozalit stili ile hibrit OK. Kök şantiye CRM için industrial-workwear tercih."
  - sektör: kuafor
    stil: editorial-print
    condition: "Koleksiyon/lookbook/editorial portföy için ✓. Randevu-odaklı salon için minimal-swiss/warm-organic tercih."
  - sektör: klinik
    stil: editorial-print
    condition: "Sağlık editorial (yazı dergisi tarzı) için OK. Hasta portalı için data-dense tercih."
  - sektör: eticaret
    stil: editorial-print
    condition: "Editorial e-ticaret (kitap, plak, dergi abonelik, zanaat) için ✓. Commodity için ✗."
  - sektör: spa
    stil: editorial-print
    condition: "Editorial terroir spa (doğa + bitki + çay içerik ağırlıklı) için OK. Kampanya/paket satış için warm-organic tercih."
  - sektör: gayrimenkul
    stil: editorial-print
    condition: "Premium/butik emlak katalogu için OK. MLS/ilan-yoğun site için data-dense tercih."
  - sektör: otel
    stil: editorial-print
    condition: "Butik dergi-editorial otel (terroir, tarihi, sanat koleksiyonu) için OK. Booking-flow yoğun otel için warm-organic tercih."

