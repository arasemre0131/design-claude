# ============================================================
# STYLE-SECTOR COMPATIBILITY MATRIX
# 10 sektör × 10 stil = 100 hücre
# Her hücre durumu: ✓✓ (default) · ✓ (aktif) · ⚠ (koşullu) · ✗ (forbidden)
# validate-combo.js bunu kullanmaz ama MATRIX.md'nin kaynağı
# Toplam: 60 aktif (✓✓ + ✓) + 20 koşullu + 20 forbidden
# ============================================================
matrix:
  insaat:
    brutalist: "✓"               # industrial spirit uyar
    editorial-luxury: "⚠"         # CRM/admin OK, şantiye değil
    kinetic-agency: "✓"
