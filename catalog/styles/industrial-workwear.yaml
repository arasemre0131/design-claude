sample_palette:
  concrete: "#D4CFC4"
  concrete_deep: "#C0BBAE"
  concrete_shadow: "#ADA799"
  ink: "#111111"
  orange: "#E85D04"            # safety orange
  hazard: "#F5C400"            # hazard sarisi
  slab: "#1E1E1E"
sample_font_pair: "Archivo Narrow Black + Geist Sans 400-600 + Geist Mono + Stardos Stencil (hazard label)"

tier_fit: [1, 2, 3, 4]
notes:
  - "Imza: hazard stripe (repeating-linear-gradient 45deg, hazard 18px + ink 18px)."
  - "Rounded corners KESIN YASAK — border-radius: 0."
