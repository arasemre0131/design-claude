  - "AVIF kullan (Webflow native optimize)"
  - "GSAP 3.13 plugin'leri CDN'den yukle, npm paketi Webflow'da yok"
  - "Barba destroy/create lifecycle Webflow Interactions'la catismamali"
  - "prefers-reduced-motion: respect"

