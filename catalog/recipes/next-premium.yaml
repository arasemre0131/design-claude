---
id: next-premium
name: Next.js 16 Premium (Mid Tier)
tier: 2
description: |
  Next.js 16 App Router + React 19 + Tailwind v4 + shadcn/ui + Supabase + Drizzle
  + GSAP 3.13 + Lenis 1.3.4. Mid-tier standart stack — Fatih Bey Mucevher tarzi
  e-ticaret, mobilya katalog, kurumsal tanitim + iletisim formu.
---

# Evidence — Awwwards / live
evidence:
  - url: https://fatihbey-mucevher.com
    note: "Emre'nin Fatih Bey projesi Tier 2 reference"
  - url: https://linear.app
    note: "Next.js + React + Tailwind benchmark (premium SaaS)"
  - url: https://vercel.com
    note: "Vercel anasayfa — Next.js 16 standart"
  - url: https://shadcn.com
    studio: shadcn/ui
    note: "Radix + Tailwind v4 component system reference"

budget_tier: mid
budget_try: [15000, 25000]
delivery_weeks: [2, 3]
maintenance_monthly_try: [1500, 3000]
profit_margin: "%55-65"

core:
  framework:
    name: Next.js
    version: "16.x"
    features: [App Router, Turbopack, RSC, Server Actions, Streaming, Partial Prerendering]
  runtime:
    node: "22 LTS"
  language:
    name: TypeScript
    version: "5.9+"

frontend_libs:
  styling:
    - tailwindcss@4.x
    - "@tailwindcss/postcss@4.x"
    - class-variance-authority
    - clsx
    - tailwind-merge
  animation:
    - gsap@3.13.0
    - "@gsap/react@latest"         # useGSAP hook
    - lenis@1.3.4
    - framer-motion@12.x
  ui:
    - shadcn/ui
    - "@radix-ui/react-*"           # shadcn primitives
    - cmdk                          # ⌘K command palette
    - vaul                          # mobile drawer
    - sonner                        # toast
    - lucide-react
  state:
    - zustand@5.x
    - "@tanstack/react-query@5.x"
  forms:
    - react-hook-form@7.x
    - zod@3.x
    - "@hookform/resolvers@3.x"

backend:
  database: Supabase PostgreSQL 16
  orm: "drizzle-orm@latest"        # tercih edilen (lightweight)
  alt_orm: "prisma@6.x"
  auth: "@supabase/ssr + @supabase/auth-helpers-nextjs"
  storage: "Supabase Storage"
  realtime: "Supabase Realtime (opsiyonel)"
  email: "resend + react-email"
  api: "Next.js API Routes + Server Actions"

payment:
  primary: iyzipay                  # Turkiye
  alternative: paytr
  international: stripe

seo:
  metadata: "Next.js Metadata API (generateMetadata)"
  schema: "schema-dts + Product/LocalBusiness/FAQ JSON-LD"
  sitemap: "next-sitemap@5.x"
  i18n: "next-intl@3.x (opsiyonel)"
  analytics: "Vercel Analytics + Speed Insights"

deploy:
  target: Vercel
  edge_regions: [fra1, iad1]
  alternatives: [Cloudflare Pages, AWS Amplify]

scaffold_command: |
  pnpm create next-app@latest <project-name> --ts --app --tailwind --turbo
  pnpm dlx shadcn@latest init -d
  pnpm add gsap @gsap/react lenis framer-motion zustand
  pnpm add @supabase/supabase-js @supabase/ssr drizzle-orm
  pnpm add react-hook-form zod @hookform/resolvers

constraints:
  - "Core Web Vitals: LCP < 2.5s, CLS < 0.1 (hedef 0.05), INP < 200ms"
  - "Mobile Lighthouse >= 90"
  - "WCAG AA full audit (axe-core pass)"
  - "3 breakpoint zorunlu (375/768/1280)"
  - "Supabase RLS policy her tabloda"
  - "No client-side API key leak (sadece anon, service_role server-only)"
  - "prefers-reduced-motion: respect"

research_refs:
  - FRONTEND-TECHSTACK.md (Core Stack bolumu)
  - research/nextjs-16-app-router.md
  - research/supabase-rls-patterns.md
  - research/tailwind-v4-theme-directive.md
  - research/shadcn-ui-customization.md

claude_design_handoff:
  supported: optional
  trigger: "Muşteri custom design istediginde Tier 2 sonunda"
  note: "Tier 3+ icin daha uygun ama Tier 2'de de calisir."

red_line:
  - "3D viewer R3F gerekiyorsa -> next-r3f (Tier 3)"
  - "Multi-tenant / SLA gerekiyorsa -> next-enterprise-monorepo (Tier 4)"
