usage_guidelines:
  - "OSS paketleri asla blindly kurma — once license + bundle size + maintenance status kontrol et"
  - "Ajans signature pattern'lerini piksel-piksel kopyalama (telif + vibe-coded risk)"
  - "MIT-safe rewrite icin atoms/motion-ajans/ altinda atom ID uret"
  - "Adoratorio suite Vue-centric, Next.js projeye adapt etmek gerekir"
  - "Active Theory supporting lib'leri genelde vanilla JS, tree-shake dostudur"
  - "Locomotive Scroll v5 Lenis ustune yazildi, direkt Lenis tercih edilebilir (v5 optional)"
  - "Fiddle StringTune declarative ama Nuxt entegrasyonu agir — Next.js icin ozel wrapper gerekir"

summary:
  total_packages: 25
  agency_oss_packages: 17
  complementary_mit_packages: 8
  mit_licensed: 24
  apache_licensed: 1
  agency_private: 1
  mit_safe_rewrites: 7
  most_valuable:
    - "gsap 3.13.0 (fiili animasyon standardı — 93% ajans)"
    - "lenis 1.3.4 (smooth scroll tekel — 86% ajans)"
    - "@adoratorio/aion (animation orchestration / central rAF)"
    - "activetheory/split-text (free SplitText alternative)"
    - "activetheory/GaussianSplats3D (premium capture viewer)"
    - "locomotive-scroll v5 (smooth scroll w/ attribute system)"
    - "@fiddle-digital/string-tune (declarative scroll animation)"
