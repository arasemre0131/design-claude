  packages:
    - package: gsap
      version: "3.13.0"
      license: MIT
      usage_rate: "93% (13/14 ajans)"
      cdn: "https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"
      note: "Fiili animasyon standardı. 3.13+ tüm plugin'ler ücretsiz (SplitText, MorphSVG, DrawSVG dahil)"
      atom_related: [MO1]
    - package: lenis
      version: "1.3.4"
      license: MIT
      usage_rate: "86% (12/14 ajans)"
      cdn: "https://cdn.jsdelivr.net/npm/lenis@1.3.4/dist/lenis.min.js"
      note: "Smooth scroll fiili tekel, Lusion hariç"
      atom_related: [MO2]
    - package: "@barba/core"
      version: "2.10.3"
      license: MIT
      usage_rate: "36% (5/14)"
      cdn: "https://cdn.jsdelivr.net/npm/@barba/core@2.10.3/dist/barba.umd.min.js"
      note: "Page transition fiili standardı"
      atom_related: [MO6]
    - package: ogl
